# Allwinner T527 — SoC preset. Public-spec estimates; verify before use.
masters:
  - {name: CAN0, type: can, enabled: false, verify: true, params: {bitrate_mbps: 0.5, load_pct: 0.3}}
  - {name: CSI0, type: mipi_csi, verify: true, params: {width: 1920, height: 1080, fps: 30, bpp: 12, lanes: 2, count: 4}}
  - {name: CSI1, type: mipi_csi, verify: true, params: {width: 1280, height: 720, fps: 30, bpp: 12, lanes: 2}}
  - {name: DSI0, type: mipi_dsi, verify: true, params: {width: 1280, height: 720, fps: 60, bpp: 24, lanes: 4}}
  - {name: USB0, type: usb, verify: true, params: {version: "3", util_pct: 0.3}}
  - {name: ETH0, type: eth, verify: true, params: {link_gbps: 1, util_pct: 0.3, mtu: 1500}}
  - {name: EMMC0, type: flash, verify: true, params: {type: emmc, seq_read_mbps: 400, seq_write_mbps: 200, util_pct: 0.3, random_ratio: 0.4}}
  - {name: SPIFLASH0, type: spi, verify: true, params: {clock_mhz: 100, xfer_bytes: 4096, xfer_hz: 5000}}
pipelines:
  - name: ISP0
    type: isp
    source: CSI1              # option: inherit input stream from a master (CSI/DSI). Null = use params.width/height/fps.
    mode: serial
    verify: true
    stages:
      - {name: bayer,    read_factor: 1.0, write_factor: 1.0}
      - {name: demosaic, read_factor: 1.5, write_factor: 2.0}
      - {name: yuv_scale,read_factor: 2.0, write_factor: 1.0}
  - name: VENC0
    type: venc
    source: ISP0
    verify: true
    params: {width: 1920, height: 1080, fps: 30, bpp: 16, codec: h264}
  - name: NPU0
    type: npu
    source: [CSI0, ISP0]
    mode: parallel
    verify: true
    params: {params_mbytes: 30, activation_mbytes: 15, inference_fps: 30, tops_peak: 2, tops_used: 1.5}
  - name: GPU0
    type: gpu
    verify: true
    params: {width: 1280, height: 720, fps: 60, bpp: 32, overdraw: 3}
  - name: DISP0
    type: display
    source: ISP0
    verify: true
ddr_channels:
  - {name: DDR0, theoretical_peak_mbps: 12800, efficiency: 0.7}  # LPDDR4 3200, 32-bit
alert_thresholds: {yellow: 0.6, red: 0.8}
