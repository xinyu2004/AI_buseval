# Qualcomm SA8155P (Snapdragon 8155) — IVI SoC preset. Public-spec estimates; verify.
masters:
  - {name: CAN0, type: can, enabled: false, verify: true, params: {bitrate_mbps: 0.5, load_pct: 0.3}}
  - {name: CAN1, type: can, enabled: false, verify: true, params: {bitrate_mbps: 0.5, load_pct: 0.3}}
  - {name: CSI0, type: mipi_csi, verify: true, params: {width: 1920, height: 1080, fps: 30, bpp: 12, lanes: 4, count: 4}}
  - {name: CSI1, type: mipi_csi, verify: true, params: {width: 1280, height: 720, fps: 30, bpp: 12, lanes: 2}}
  - {name: DSI0, type: mipi_dsi, verify: true, params: {width: 1920, height: 720, fps: 60, bpp: 24, lanes: 4}}
  - {name: USB0, type: usb, verify: true, params: {version: "3", util_pct: 0.3}}
  - {name: USB1, type: usb, verify: true, params: {version: "2", util_pct: 0.2}}
  - {name: ETH0, type: eth, verify: true, params: {link_gbps: 1, util_pct: 0.3, mtu: 1500}}
  - {name: UFS0, type: flash, verify: true, params: {type: ufs, seq_read_mbps: 2000, seq_write_mbps: 1200, util_pct: 0.3, random_ratio: 0.3}}
pipelines:
  - name: ISP0
    type: isp
    source: CSI1              # option: inherit input stream from a master (CSI/DSI). Null = use params.width/height/fps.
    mode: serial
    verify: true
    stages:
      - {name: bayer,    read_factor: 1.0, write_factor: 1.0}
      - {name: demosaic, read_factor: 1.5, write_factor: 2.0}
      - {name: yuv_scale,read_factor: 2.0, write_factor: 1.0}
  - name: VENC0
    type: venc
    source: ISP0
    verify: true
    params: {width: 1920, height: 1080, fps: 30, bpp: 16, codec: h264}
  - name: GPU0
    type: gpu
    verify: true
    params: {width: 1920, height: 720, fps: 60, bpp: 32, overdraw: 3}
  - name: DISP0
    type: display
    source: ISP0
    verify: true
ddr_channels:
  - {name: DDR0, theoretical_peak_mbps: 34133, efficiency: 0.7}  # LPDDR4X 4266, 128-bit (quad-channel effective)
alert_thresholds: {yellow: 0.6, red: 0.8}
