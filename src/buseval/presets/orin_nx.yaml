# NVIDIA Orin NX — SoC preset. Public-spec estimates; verify before use.
masters:
  - {name: CAN0, type: can, verify: true, params: {bitrate_mbps: 0.5, load_pct: 0.3}}
  - {name: CAN1, type: can, verify: true, params: {bitrate_mbps: 0.5, load_pct: 0.3}}
  - {name: CSI0, type: mipi_csi, verify: true, params: {width: 1920, height: 1080, fps: 30, bpp: 12, lanes: 4, count: 4}}
  - {name: CSI1, type: mipi_csi, verify: true, params: {width: 1920, height: 1080, fps: 30, bpp: 12, lanes: 4}}
  - {name: CSI2, type: mipi_csi, verify: true, params: {width: 1280, height: 720, fps: 30, bpp: 12, lanes: 2}}
  - {name: CSI3, type: mipi_csi, verify: true, params: {width: 1280, height: 720, fps: 30, bpp: 12, lanes: 2}}
  - {name: USB0, type: usb, verify: true, params: {version: "3.2", util_pct: 0.3}}
  - {name: ETH0, type: eth, verify: true, params: {link_gbps: 10, util_pct: 0.2, mtu: 1500}}
  - {name: NVME0, type: flash, verify: true, params: {type: nand, seq_read_mbps: 3500, seq_write_mbps: 2500, util_pct: 0.2, random_ratio: 0.1}}
pipelines:
  - name: ISP0
    type: isp
    mode: serial
    verify: true
    params: {width: 1920, height: 1080, fps: 30, in_format: raw12}
    stages:
      - {name: bayer,    read_factor: 1.0, write_factor: 1.0}
      - {name: demosaic, read_factor: 1.5, write_factor: 2.0}
      - {name: yuv_scale,read_factor: 2.0, write_factor: 1.0}
  - name: NPU0
    type: npu
    mode: parallel
    verify: true
    params: {params_mbytes: 120, activation_mbytes: 60, inference_fps: 60, tops_peak: 100, tops_used: 70}
  - name: GPU0
    type: gpu
    verify: true
    params: {width: 1920, height: 1080, fps: 60, bpp: 32, overdraw: 3}
  - name: DISP0
    type: display
    verify: true
    params: {width: 1920, height: 1080, fps: 60, bpp: 32}
ddr_channels:
  - {name: DDR0, theoretical_peak_mbps: 102400, efficiency: 0.7}  # LPDDR5 6400, 128-bit
alert_thresholds: {yellow: 0.6, red: 0.8}
